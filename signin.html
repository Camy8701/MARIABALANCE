<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Maria Balance</title>
  <meta name="description" content="Sign in or create your Maria Balance account to book Pilates classes in Barcelona.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <meta name="robots" content="noindex">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allison&family=Cormorant+Garamond:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --blush: #f4efec;
      --peach-light: #f0e4da;
      --peach-mid: #ddb8a8;
      --peach-deep: #c9907c;
      --warm-brown: #7b4d3c;
      --warm-dark: #3d2218;
      --espresso: #211817;
      --white: #fffefa;
    }
    body {
      font-family: "Cormorant Garamond", Georgia, serif;
      background: var(--blush);
      color: var(--espresso);
      min-height: 100vh;
    }
    .font-script { font-family: "Allison", cursive; font-weight: 400; }
    .font-label  { font-family: "Space Mono", monospace; }

    .auth-input {
      width: 100%;
      border: 1.5px solid #ddb8a8;
      border-radius: 12px;
      padding: 14px 18px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.1rem;
      color: #211817;
      background: #fffefa;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .auth-input:focus {
      border-color: #c9907c;
      box-shadow: 0 0 0 3px rgba(201,144,124,.15);
    }
    .auth-input::placeholder {
      color: #b8aaa3;
    }

    .auth-btn-primary {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: #3d2218;
      color: #fffefa;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .12s;
    }
    .auth-btn-primary:hover { background: #c9907c; }
    .auth-btn-primary:active { transform: scale(.98); }

    .auth-btn-social {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      background: #fffefa;
      border: 1.5px solid #ddb8a8;
      color: #3d2218;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color .2s, background .2s, transform .12s;
    }
    .auth-btn-social:hover { border-color: #c9907c; background: #f0e4da; }
    .auth-btn-social:active { transform: scale(.98); }

    .tab-active {
      color: #3d2218;
      border-bottom: 2px solid #c9907c;
    }
    .tab-inactive {
      color: #b8aaa3;
      border-bottom: 2px solid transparent;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .form-panel { animation: fadeIn .3s ease forwards; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #b8aaa3;
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddb8a8;
    }

    /* Error / success messages */
    .field-error {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: .1em;
      color: #c9907c;
      margin-top: 6px;
      display: none;
    }
    .field-wrap:has(input:invalid:not(:placeholder-shown)) .field-error {
      display: block;
    }
  </style>
</head>

<body class="antialiased flex flex-col">

  <!-- Nav -->
  <nav class="flex items-center justify-between px-6 py-5 md:px-12">
    <a href="mariabalance-index.html" class="font-script text-3xl text-[#3d2218] hover:opacity-75 transition">Maria Balance</a>
    <a href="mariabalance-index.html" class="font-label text-[11px] uppercase tracking-[.16em] text-[#7b4d3c] border border-[#c9907c]/60 px-5 py-2 rounded-full hover:bg-[#c9907c] hover:text-[#fffefa] hover:border-[#c9907c] transition duration-200 inline-flex items-center gap-2">
      <i data-lucide="arrow-left" class="h-3.5 w-3.5 stroke-[1.8]"></i>
      Back home
    </a>
  </nav>

  <!-- Auth card -->
  <main class="flex flex-1 items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

      <!-- Header -->
      <div class="mb-8 text-center">
        <h1 class="font-script text-6xl text-[#3d2218] leading-none">Welcome</h1>
        <p class="mt-3 font-label text-xs uppercase tracking-[.2em] text-[#b8aaa3]">Sign in or create your account</p>
      </div>

      <!-- Tab toggle -->
      <div class="mb-8 flex border-b border-[#ddb8a8]">
        <button id="tab-signin" onclick="showTab('signin')"
          class="flex-1 pb-3 font-label text-xs uppercase tracking-[.18em] transition tab-active">
          Sign In
        </button>
        <button id="tab-signup" onclick="showTab('signup')"
          class="flex-1 pb-3 font-label text-xs uppercase tracking-[.18em] transition tab-inactive">
          Sign Up
        </button>
      </div>

      <!-- Card -->
      <div class="rounded-3xl bg-[#fffefa] p-8 shadow-sm" style="border: 1px solid #ddb8a8">

        <!-- SIGN IN FORM -->
        <div id="panel-signin" class="form-panel">
          <div class="flex flex-col gap-5">
            <!-- Social sign-in -->
            <button class="auth-btn-social" onclick="handleSocial('Google')">
              <!-- Google icon SVG -->
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M17.64 9.2a10.34 10.34 0 00-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.91A8.8 8.8 0 0017.64 9.2z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26a5.4 5.4 0 01-8.07-2.84H.96v2.33A9 9 0 009 18z" fill="#34A853"/>
                <path d="M3.98 10.72A5.41 5.41 0 013.7 9c0-.6.1-1.17.28-1.72V4.95H.96A9 9 0 000 9c0 1.45.35 2.82.96 4.05l3.02-2.33z" fill="#FBBC05"/>
                <path d="M9 3.58c1.32 0 2.5.45 3.44 1.34L14.97 2.4A9 9 0 009 0 9 9 0 00.96 4.95l3.02 2.33A5.37 5.37 0 019 3.58z" fill="#EA4335"/>
              </svg>
              Continue with Google
            </button>

            <button class="auth-btn-social" onclick="handleSocial('Facebook')">
              <!-- Facebook icon SVG -->
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.932-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
              </svg>
              Continue with Facebook
            </button>

            <div class="divider">or</div>

            <!-- Email/password -->
            <div class="flex flex-col gap-4">
              <div>
                <label class="font-label text-[10px] uppercase tracking-[.16em] text-[#7b4d3c] block mb-2">Email *</label>
                <input type="email" placeholder="your@email.com" required class="auth-input">
              </div>
              <div>
                <label class="font-label text-[10px] uppercase tracking-[.16em] text-[#7b4d3c] block mb-2">Password *</label>
                <input type="password" placeholder="••••••••" required class="auth-input">
              </div>
            </div>

            <div class="text-right">
              <a href="#" class="font-label text-[10px] uppercase tracking-[.14em] text-[#c9907c] hover:text-[#3d2218] transition">Forgot password?</a>
            </div>

            <button class="auth-btn-primary" onclick="handleSignin()">Sign In</button>
          </div>

          <p class="mt-6 text-center font-label text-[10px] uppercase tracking-[.14em] text-[#b8aaa3]">
            No account?
            <button onclick="showTab('signup')" class="text-[#c9907c] hover:text-[#3d2218] transition underline underline-offset-2">Create one</button>
          </p>
        </div>

        <!-- SIGN UP FORM -->
        <div id="panel-signup" class="form-panel" style="display:none">
          <div class="flex flex-col gap-5">
            <!-- Social sign-up -->
            <button class="auth-btn-social" onclick="handleSocial('Google')">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M17.64 9.2a10.34 10.34 0 00-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.91A8.8 8.8 0 0017.64 9.2z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26a5.4 5.4 0 01-8.07-2.84H.96v2.33A9 9 0 009 18z" fill="#34A853"/>
                <path d="M3.98 10.72A5.41 5.41 0 013.7 9c0-.6.1-1.17.28-1.72V4.95H.96A9 9 0 000 9c0 1.45.35 2.82.96 4.05l3.02-2.33z" fill="#FBBC05"/>
                <path d="M9 3.58c1.32 0 2.5.45 3.44 1.34L14.97 2.4A9 9 0 009 0 9 9 0 00.96 4.95l3.02 2.33A5.37 5.37 0 019 3.58z" fill="#EA4335"/>
              </svg>
              Sign up with Google
            </button>

            <button class="auth-btn-social" onclick="handleSocial('Facebook')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.932-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
              </svg>
              Sign up with Facebook
            </button>

            <div class="divider">or</div>

            <!-- Name + Email + Phone + Password -->
            <div class="flex flex-col gap-4">
              <div>
                <label class="font-label text-[10px] uppercase tracking-[.16em] text-[#7b4d3c] block mb-2">Full Name *</label>
                <input type="text" id="su-name" placeholder="Maria García" required class="auth-input">
              </div>
              <div>
                <label class="font-label text-[10px] uppercase tracking-[.16em] text-[#7b4d3c] block mb-2">Email *</label>
                <input type="email" id="su-email" placeholder="your@email.com" required class="auth-input">
              </div>
              <div>
                <label class="font-label text-[10px] uppercase tracking-[.16em] text-[#7b4d3c] flex items-center gap-2 mb-2">
                  Phone
                  <span class="rounded-full bg-[#f0e4da] px-2 py-0.5 text-[9px] tracking-[.12em] text-[#b8aaa3]">optional</span>
                </label>
                <input type="tel" id="su-phone" placeholder="+34 6xx xxx xxx" class="auth-input">
              </div>
              <div>
                <label class="font-label text-[10px] uppercase tracking-[.16em] text-[#7b4d3c] block mb-2">Password *</label>
                <input type="password" id="su-password" placeholder="••••••••" required minlength="6" class="auth-input">
              </div>
            </div>

            <button class="auth-btn-primary" onclick="handleSignup()">Create Account</button>

            <p class="text-center font-label text-[10px] uppercase tracking-[.12em] text-[#b8aaa3] leading-relaxed">
              By creating an account you agree to our
              <a href="#" class="text-[#c9907c] hover:underline">Terms</a> &
              <a href="#" class="text-[#c9907c] hover:underline">Privacy Policy</a>
            </p>
          </div>

          <p class="mt-6 text-center font-label text-[10px] uppercase tracking-[.14em] text-[#b8aaa3]">
            Already have an account?
            <button onclick="showTab('signin')" class="text-[#c9907c] hover:text-[#3d2218] transition underline underline-offset-2">Sign in</button>
          </p>
        </div>

        <!-- Success message (hidden) -->
        <div id="panel-success" class="form-panel text-center py-4" style="display:none">
          <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-full" style="background:#f0e4da">
            <i data-lucide="check" class="h-7 w-7 stroke-[2] text-[#c9907c]"></i>
          </div>
          <h2 class="font-script text-4xl text-[#3d2218] leading-none" id="success-title">Welcome!</h2>
          <p class="mt-3 font-label text-xs uppercase tracking-[.16em] text-[#7b4d3c]" id="success-msg">You're signed in.</p>
          <a href="mariabalance-index.html" class="mt-6 inline-block font-label text-[11px] uppercase tracking-[.16em] text-[#c9907c] hover:text-[#3d2218] transition border-b border-[#c9907c] pb-0.5">Back to Maria Balance</a>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-[#ddb8a8]/50 px-6 py-6 text-center">
    <p class="font-label text-[10px] uppercase tracking-[.18em] text-[#b8aaa3]">© 2026 Maria Balance · Pilates in Barcelona</p>
  </footer>

  <script>
    lucide.createIcons();

    function showTab(tab) {
      ['signin','signup'].forEach(function(t) {
        document.getElementById('panel-' + t).style.display = t === tab ? 'block' : 'none';
        document.getElementById('tab-' + t).className =
          'flex-1 pb-3 font-label text-xs uppercase tracking-[.18em] transition ' +
          (t === tab ? 'tab-active' : 'tab-inactive');
      });
      // Trigger animation
      var panel = document.getElementById('panel-' + tab);
      panel.style.animation = 'none';
      void panel.offsetWidth;
      panel.style.animation = 'fadeIn .3s ease forwards';
    }

    function showSuccess(title, msg) {
      ['signin','signup'].forEach(function(t) {
        document.getElementById('panel-' + t).style.display = 'none';
      });
      document.getElementById('success-title').textContent = title;
      document.getElementById('success-msg').textContent   = msg;
      var s = document.getElementById('panel-success');
      s.style.display = 'block';
      s.style.animation = 'none';
      void s.offsetWidth;
      s.style.animation = 'fadeIn .3s ease forwards';
      lucide.createIcons();
    }

    function handleSocial(provider) {
      showSuccess('Welcome back!', 'Signed in with ' + provider + '.');
    }

    function handleSignin() {
      showSuccess('Welcome back!', 'You\'re now signed in.');
    }

    function handleSignup() {
      var name = document.getElementById('su-name').value.trim();
      var email = document.getElementById('su-email').value.trim();
      if (!name || !email) return;
      showSuccess('Welcome, ' + (name.split(' ')[0] || 'there') + '!', 'Account created. See you on the mat.');
    }
  </script>
</body>
</html>
